<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Shmily API 控制台</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon"></div>
        <div>
          <div class="brand-title">SpringBoot</div>
          <div class="brand-sub">API Console</div>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <label class="mini-label">API 根地址</label>
        <input type="text" id="apiBase" class="mini-input" placeholder="留空=同域" autocomplete="off" />
        <label class="mini-label">Authorization（可选）</label>
        <input type="text" id="authHeader" class="mini-input" placeholder="不传则走拦截器默认" autocomplete="off" />
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <h1 class="page-title" id="pageTitle">概览</h1>
        <p class="page-desc" id="pageDesc">选择左侧功能，调用后端接口并查看响应。</p>
      </header>
      <div class="panels" id="panels"></div>
    </main>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
